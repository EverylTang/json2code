<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <!-- Logo area -->
  <circle cx="100" cy="100" r="28" fill="#3b82f6" opacity="0.9"/>
  <text x="100" y="108" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="700" font-size="24">&lt;/&gt;</text>
  <!-- Tag -->
  <rect x="145" y="82" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="205" y="106" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-weight="600" font-size="16">19 TOOLS</text>
  <!-- Brand -->
  <text x="70" y="210" fill="white" font-family="system-ui, sans-serif" font-weight="800" font-size="72">CodeTools</text>
  <text x="70" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-weight="400" font-size="28">Free Online Developer Tools</text>
  <!-- Features -->
  <g transform="translate(70, 330)">
    <circle cx="8" cy="-4" r="4" fill="#3b82f6"/>
    <text x="24" y="0" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="20">Base64 • JSON • Hash • UUID • QR Code</text>
  </g>
  <g transform="translate(70, 375)">
    <circle cx="8" cy="-4" r="4" fill="#3b82f6"/>
    <text x="24" y="0" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="20">Password • Regex • Cron • Currency • Color</text>
  </g>
  <g transform="translate(70, 420)">
    <circle cx="8" cy="-4" r="4" fill="#3b82f6"/>
    <text x="24" y="0" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="20">RSA Keys • HMAC • Markdown • Webhooks</text>
  </g>
  <!-- CTA -->
  <rect x="70" y="480" width="200" height="44" rx="22" fill="#3b82f6"/>
  <text x="170" y="508" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-weight="600" font-size="18">codetools.cc</text>
  <!-- Decorative elements -->
  <circle cx="1050" cy="160" r="120" fill="#2563eb" opacity="0.08"/>
  <circle cx="1100" cy="120" r="60" fill="#60a5fa" opacity="0.06"/>
</svg>